version: "0.1"

tools:
  vivado:
    colors:
      normal:               "WHITE"
      info:                 "GRAY"    # "DARK_BLUE"
      warning:              "YELLOW"
      critical:             "MAGENTA"
      error:                "RED"
      tcl:                  "CYAN"
      success:              "GREEN"
      failed:               "RED"
      verbose:              "GRAY"
      unprocessed:          "DARK_GRAY"
      empty:                "NOCOLOR"
      sectionDelimiter:     "DARK_GRAY"
      sectionStart:         "DARK_CYAN"
      sectionEnd:           "DARK_CYAN"
      sectionTime:          "DARK_GREEN"
      subsectionStart:      "DARK_CYAN"
      subsectionEnd:        "DARK_CYAN"
      subsectionTime:       "DARK_GREEN"
      taskStart:            "YELLOW"
      taskEnd:              "YELLOW"
      taskTime:             "DARK_GREEN"
      phaseStart:           "BLUE"
      phaseEnd:             "BLUE"
      phaseTime:            "DARK_GREEN"
      subphaseStart:        "DARK_CYAN"
      subphaseEnd:          "DARK_CYAN"
      subphaseTime:         "DARK_GREEN"
      subsubphaseStart:     "DARK_CYAN"
      subsubphaseEnd:       "DARK_CYAN"
      subsubphaseTime:      "DARK_GREEN"
      subsubsubphaseStart:  "DARK_CYAN"
      subsubsubphaseEnd:    "DARK_CYAN"
      subsubsubphaseTime:   "DARK_GREEN"
      nestedTaskStart:      "DARK_CYAN"
      nestedTaskEnd:        "DARK_CYAN"
      nestedTaskTime:       "DARK_GREEN"
      nestedPhaseStart:     "DARK_CYAN"
      nestedPhaseEnd:       "DARK_CYAN"
      nestedPhaseTime:      "DARK_GREEN"
      paragraphHeadline:    "DARK_YELLOW"
      hierarchyStart:       "DARK_CYAN"
      hierarchyEnd:         "DARK_GRAY"
      xdcStart:             "DARK_CYAN"
      xdcEnd:               "DARK_GRAY"
      table:                "GRAY"

    rule-sets:
      prefilter:
        8-7129:
          action: error
          level: error

      common:
        info:
          action: remove

      problems:
        warning:
          action: remove

    outputs:
      preprocessing: prefilter

      stdout:
        rules:
          - common
        coloring: true

      synthesis:
        path: "synthesis.log"
        commands:
          - synth_design
        rule-sets:
          - common

      implementation:
        path: "implementation.log"
        commands:
          - link_design
          - opt_design
          - place_design
          - phyopt_design
          - route_design
        rule-sets:
          - common

      problem:
        path: "problems.log"
        rule-sets:
          - common
          - problems

    exports:
      cellUsage:
        json: cellUsage.json
        yaml: cellUsage.yaml

    policies:
      hasLatches: error
      sensitivityMismatch: warning
      combinatorialLoop: error
