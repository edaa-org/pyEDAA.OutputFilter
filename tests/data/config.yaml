#          - common
#          - problems

    exports:
      cellUsage:
        json: CellUsage.json
#        yaml: cellUsage.yaml
      blackBoxes:
        json: BlackBoxes.json
      readXDCFiles:
        json: XDCfiles.json
      hierarchy:
        json: Hierarchy.json

    policies:
      hasLatches: error
      sensitivityMismatch: warning
      combinatorialLoop: error
